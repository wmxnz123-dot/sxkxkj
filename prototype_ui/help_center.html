                    <div class="hidden flex-col py-1 group-content">

                <a href="help_center.html" class="flex items-center justify-between px-6 py-3.5 hover:bg-gray-50 hover:text-[#1c7ffd] transition-colors nav-item" data-href="help_center.html">

                <!-- 消息中心 -->

                    <div class="flex items-center justify-between px-6 py-3.5 hover:bg-gray-50 text-[#606266] hover:text-[#1c7ffd] transition-colors cursor-pointer group-header" onclick="toggleNavGroup(this)">

                    </div>

        <script>
            // 侧边栏菜单交互逻辑
            function toggleNavGroup(element) {
                const content = element.nextElementSibling;
                const icon = element.querySelector('.group-icon');
                
                // Toggle current group
                content.classList.toggle('hidden');
                content.classList.toggle('flex');
                icon.classList.toggle('-rotate-90');
                
                // Toggle active style for header
                if(!content.classList.contains('hidden')) {
                    element.classList.add('text-[#1c7ffd]');
                    element.querySelector('.ml-2').classList.add('font-medium');
                } else {
                    // Check if any child is active, if so keep header highlighted
                    const hasActiveChild = content.querySelector('.bg-blue-50');
                    if (!hasActiveChild) {
                        element.classList.remove('text-[#1c7ffd]');
                        element.querySelector('.ml-2').classList.remove('font-medium');
                    }
                }
            }

            // 初始化菜单高亮
            document.addEventListener('DOMContentLoaded', () => {
                const currentPath = window.location.pathname.split('/').pop() || 'workbench.html';
                const navItems = document.querySelectorAll('.nav-item');
                
                navItems.forEach(item => {
                    const hrefs = item.getAttribute('data-href').split(',');
                    if (hrefs.includes(currentPath)) {
                        // 如果是顶级菜单
                        if (item.parentElement.id === 'main-nav') {
                            item.classList.add('bg-blue-50', 'text-[#1c7ffd]', 'font-medium', 'border-r-2', 'border-[#1c7ffd]');
                            item.classList.remove('text-[#606266]');
                        } else {
                            // 如果是子菜单
                            item.classList.add('bg-blue-50', 'text-[#1c7ffd]', 'font-medium');
                            
                            // 展开父级菜单
                            const groupContent = item.closest('.group-content');
                            const groupHeader = groupContent.previousElementSibling;
                            const groupIcon = groupHeader.querySelector('.group-icon');
                            
                            groupContent.classList.remove('hidden');
                            groupContent.classList.add('flex');
                            groupIcon.classList.add('-rotate-90');
                            
                            groupHeader.classList.add('text-[#1c7ffd]');
                            groupHeader.querySelector('.ml-2').classList.add('font-medium');
                        }
                    }
                });
            });
        </script>

        <!-- 右侧内容区 -->
        <main class="flex-1 flex flex-col overflow-hidden bg-[#f0f2f5] relative">

                <span class="text-[#303133]">帮助中心</span>
            </div>

            <!-- 核心内容容器 -->

                <!-- 搜索区 -->
                <div class="bg-white rounded p-6 shadow-[0_2px_12px_0_rgba(0,0,0,0.05)] flex items-center gap-4">
                    <input type="text" placeholder="请输入" class="w-[300px] h-9 px-3 border border-gray-300 rounded text-[14px] text-gray-700 focus:outline-none focus:border-[#1c7ffd] placeholder-gray-400">
                    <button class="h-9 px-6 bg-[#1c7ffd] text-white rounded text-[14px] hover:bg-blue-500 transition-colors shadow-sm">搜索</button>
                </div>

                <!-- 列表区 -->
                <div class="bg-white rounded shadow-[0_2px_12px_0_rgba(0,0,0,0.05)] flex-1 flex flex-col">
                    <div class="flex-1">
                        <!-- Item 1 -->
                        <div class="flex items-center justify-between p-5 border-b border-gray-100 hover:bg-gray-50 transition-colors group">
                            <div class="flex items-center gap-3">
                                <div class="w-6 h-6 rounded-full border border-[#1c7ffd] text-[#1c7ffd] flex items-center justify-center text-[12px] font-medium shrink-0">?</div>
                                <span class="text-[14px] text-[#303133]">忘记密码怎么办？</span>
                            </div>

                        </div>
                        
                        <!-- Item 2 -->
                        <div class="flex items-center justify-between p-5 border-b border-gray-100 hover:bg-gray-50 transition-colors group">
                            <div class="flex items-center gap-3">
                                <div class="w-6 h-6 rounded-full border border-[#1c7ffd] text-[#1c7ffd] flex items-center justify-center text-[12px] font-medium shrink-0">?</div>
                                <span class="text-[14px] text-[#303133]">如何上传数据文件？</span>
                            </div>
                            <button onclick="openDrawer('如何上传数据文件？', '进入数据管理模块，点击“上传文件”，选择本地文件后提交。')" class="text-[#1c7ffd] text-[14px] opacity-80 group-hover:opacity-100 transition-opacity">查看解答>></button>
                        </div>
                    </div>
                    
                    <!-- 分页 -->
                    <div class="p-4 border-t border-gray-100 flex justify-end items-center text-[#606266] text-sm shrink-0">
                        <span class="mr-4">共 2 条</span>
                        <div class="flex items-center gap-1">
                            <button class="w-7 h-7 flex items-center justify-center border border-gray-200 rounded text-gray-400 bg-gray-50 cursor-not-allowed">
                                <i class="fa-solid fa-angle-left"></i>
                            </button>
                            <button class="w-7 h-7 flex items-center justify-center border border-[#1c7ffd] rounded text-[#1c7ffd] bg-blue-50">1</button>
                            <button class="w-7 h-7 flex items-center justify-center border border-gray-200 rounded text-gray-400 bg-gray-50 cursor-not-allowed">
                                <i class="fa-solid fa-angle-right"></i>
                            </button>
                        </div>
                        <div class="relative ml-4 w-[90px]">

                                <option>10 条/页</option>
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-2 top-1/2 -translate-y-1/2 text-[10px] text-gray-400 pointer-events-none"></i>
                        </div>
                    </div>

        </main>

    <!-- 抽屉遮罩 -->
    <div id="drawerOverlay" class="fixed inset-0 bg-black/40 z-40 hidden backdrop-blur-[1px] transition-opacity" onclick="closeDrawer()"></div>
    
    <!-- 抽屉内容 -->
    <div id="detailDrawer" class="fixed top-0 right-0 w-[600px] h-full bg-[#f0f2f5] z-50 transform translate-x-full transition-transform duration-300 shadow-2xl flex flex-col">
        <!-- Header -->
        <div class="h-14 bg-white border-b border-gray-100 flex items-center justify-between px-6 shrink-0 shadow-sm relative z-10">
            <span class="font-bold text-[#303133] text-[16px]">问题解答详情</span>
            <button onclick="closeDrawer()" class="text-gray-400 hover:text-[#1c7ffd] transition-colors"><i class="fa-solid fa-xmark text-lg"></i></button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-6 flex flex-col gap-4">
            <!-- 问题 -->
            <div class="flex items-start gap-3">
                <div class="w-6 h-6 rounded-full bg-[#1c7ffd] text-white flex items-center justify-center text-[12px] font-medium shrink-0 mt-0.5">?</div>
                <h3 id="drawerQuestionTitle" class="text-[16px] font-bold text-[#303133] leading-7">如何上传数据文件？</h3>
            </div>
            
            <!-- 解答 -->
            <div class="bg-white p-5 rounded shadow-sm border border-gray-100 flex items-start gap-3">
                <div class="w-6 h-6 rounded-full bg-[#5a8bfb] text-white flex items-center justify-center text-[12px] font-medium shrink-0 mt-0.5">答</div>
                <p id="drawerAnswerContent" class="text-[14px] text-[#606266] leading-7">进入数据管理模块，点击“上传文件”，选择本地文件后提交。</p>
            </div>
        </div>
    </div>

    <script>
        function openDrawer(question, answer) {
            // 更新抽屉内容
            document.getElementById('drawerQuestionTitle').textContent = question;
            document.getElementById('drawerAnswerContent').textContent = answer;
            
            // 显示抽屉
            const overlay = document.getElementById('drawerOverlay');
            const drawer = document.getElementById('detailDrawer');
            if(overlay && drawer) {
                overlay.classList.remove('hidden');
                setTimeout(() => { drawer.classList.remove('translate-x-full'); }, 10);
            }
        }
        
        function closeDrawer() {
            const overlay = document.getElementById('drawerOverlay');
            const drawer = document.getElementById('detailDrawer');
            if(overlay && drawer) {
                drawer.classList.add('translate-x-full');
                setTimeout(() => { overlay.classList.add('hidden'); }, 300);
            }
        }
    </script>
</body>
